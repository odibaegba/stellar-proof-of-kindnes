name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Rust / Soroban contract tests
  # ─────────────────────────────────────────────────────────────────────────────
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install soroban-cli
        run: cargo install --locked soroban-cli --version 21.0.0

      - name: Run contract test suite
        working-directory: ./contracts
        run: cargo test --features testutils --verbose

      - name: Build release WASM
        working-directory: ./contracts
        run: |
          cargo build --target wasm32-unknown-unknown --release
          WASM_PATH="$(find ../target -name '*.wasm' | head -n1)"
          echo "WASM binary size: $(wc -c < "$WASM_PATH") bytes"
          ls -lh "$WASM_PATH"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Frontend build + type-check + lint
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: TypeScript type-check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Build production bundle
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_SOROBAN_RPC_URL:      https://soroban-testnet.stellar.org
          NEXT_PUBLIC_CONTRACT_ID:          PLACEHOLDER_FOR_CI
          NEXT_PUBLIC_NETWORK_PASSPHRASE:   "Test SDF Network ; September 2015"
          NEXT_PUBLIC_NETWORK:              TESTNET
        run: npm run build
